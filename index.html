<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* LIGHT MODE (default) */
:root{
  --bg:#ffffff;--surface:#f7f6f3;--surface2:#efede9;--surface3:#e8e5e0;
  --border:#e3e0db;--border2:#d4d0ca;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#9a9a9a;
  --green:#2d7a4f;--green-dim:#3a9460;--green-bg:#edf7f1;--green-border:#b8dfc9;
  --blue:#1e5fa0;--blue-dim:#2471bb;--blue-bg:#e8f1fb;--blue-border:#b0cef0;
  --amber:#8a5a0a;--amber-bg:#fdf4e3;--amber-border:#e8c87a;
  --red:#9b2020;--red-bg:#fdf0f0;--red-border:#e8b0b0;
  --purple:#5b3fa0;--purple-bg:#f2eeff;--purple-border:#c8b8f0;
  --accent:#2d7a4f;--accent-bg:#edf7f1;--accent-border:#b8dfc9;
}
/* DARK MODE */
body.dark{
  --bg:#191919;--surface:#222222;--surface2:#2a2a2a;--surface3:#333333;
  --border:#333333;--border2:#444444;
  --text:#e8e5e0;--text2:#a0a0a0;--text3:#606060;
  --green:#52b788;--green-dim:#6dcfa0;--green-bg:#1a2e22;--green-border:#2d5a3d;
  --blue:#60a8e8;--blue-dim:#78bcf8;--blue-bg:#162030;--blue-border:#254560;
  --amber:#e0a030;--amber-bg:#2a1e08;--amber-border:#604010;
  --red:#e87070;--red-bg:#2a1010;--red-border:#602020;
  --purple:#a888e8;--purple-bg:#1e1530;--purple-border:#503880;
  --accent:#52b788;--accent-bg:#1a2e22;--accent-border:#2d5a3d;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;transition:background .15s,color .15s}
.app{display:grid;grid-template-rows:auto auto 1fr;min-height:100vh}

/* HEADER */
header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-title{display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
h1{font-size:14px;font-weight:500;color:var(--text);letter-spacing:0}
h1 span{color:var(--text3);font-weight:400}
.header-right{display:flex;align-items:center;gap:6px}
.save-indicator{font-size:11px;color:var(--text3);margin-right:4px}
.save-indicator.saved{color:var(--green)}
.save-btn{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;transition:opacity .15s}
.save-btn:hover{opacity:.8}
.import-btn{background:var(--surface);color:var(--text2);border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500}
.import-btn:hover{background:var(--surface2)}
.theme-btn{background:var(--surface);color:var(--text2);border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.theme-btn:hover{background:var(--surface2)}

/* MONTH NAV */
.month-nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.month-nav::-webkit-scrollbar{display:none}
.month-tab{padding:0 14px;height:38px;display:flex;align-items:center;cursor:pointer;font-size:12px;font-weight:400;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;position:relative}
.month-tab:hover{color:var(--text2)}
.month-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.month-tab.has-data{color:var(--text2)}
.month-tab .dot{width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;top:7px;right:5px;display:none}
.month-tab.has-data .dot{display:block}

/* LAYOUT */
.main{display:grid;grid-template-columns:188px 1fr;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:10px 0;overflow-y:auto}
.nav-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:10px 14px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 8px;cursor:pointer;font-size:12px;font-weight:400;color:var(--text2);border-radius:6px;transition:background .1s,color .1s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-item .icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.content{padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 86px);background:var(--bg)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.card-value{font-family:'JetBrains Mono','Fira Mono',monospace;font-size:18px;font-weight:500;line-height:1;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:5px}
.card.green .card-value{color:var(--green)}
.card.blue .card-value{color:var(--blue)}
.card.amber .card-value{color:var(--amber)}
.card.red .card-value{color:var(--red)}
.card.accent .card-value{color:var(--accent)}
.card.purple .card-value{color:var(--purple)}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.chart-card h3{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:14px}
.chart-container{position:relative;height:175px}

/* SECTION TITLES */
.section-title{font-size:15px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:8px;color:var(--text)}
.section-title span{font-weight:400;color:var(--text3);font-size:13px}
.section-divider{height:1px;background:var(--border);margin:18px 0}

/* TABLES */
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.table-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.table-header h3{font-size:12px;font-weight:500;color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{padding:8px 14px;text-align:left;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface);border-bottom:1px solid var(--border)}
td{padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface)}
.num{font-family:'JetBrains Mono','Fira Mono',monospace;text-align:right}
th.num{text-align:right}
.total-row td{font-weight:500;background:var(--surface);color:var(--text)}
.total-row td.num{color:var(--accent)}

/* INPUTS */
.editable{background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono','Fira Mono',monospace;font-size:12px;text-align:right;width:100%;padding:2px 4px;border-radius:4px;outline:none;transition:background .1s}
.editable:focus{background:var(--surface2);box-shadow:0 0 0 2px var(--accent-border)}
.editable-text{background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;width:100%;padding:2px 4px;border-radius:4px;outline:none;transition:background .1s}
.editable-text:focus{background:var(--surface2);box-shadow:0 0 0 2px var(--accent-border)}
.sel{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:5px;font-size:11px;outline:none;cursor:pointer;font-family:'Inter',sans-serif}
.sel:focus{border-color:var(--accent)}

/* BADGES */
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block}
.cuota-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.cancelada-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* BUTTONS */
.check-wrap{display:flex;align-items:center;justify-content:center}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:none;border-top:1px dashed var(--border2);color:var(--text3);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;width:100%;transition:all .15s}
.add-row-btn:hover{background:var(--surface);color:var(--text2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);padding:3px 8px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;border-radius:5px;font-weight:500}
.btn-danger:hover{opacity:.75}
.btn-sm{background:var(--surface);color:var(--text2);border:1px solid var(--border);padding:3px 8px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;border-radius:5px;font-weight:500}
.btn-sm:hover{background:var(--surface2);color:var(--text)}

/* MISC */
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.summary-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.summary-row:not(:last-child){border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:2px}
.summary-key{color:var(--text2)}
.summary-val{font-family:'JetBrains Mono','Fira Mono',monospace;font-weight:500}
.fx-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:12px;flex-wrap:wrap}
.fx-bar label{color:var(--text3);font-weight:500}
.fx-bar input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:5px;font-family:'JetBrains Mono','Fira Mono',monospace;font-size:12px;width:100px;outline:none}
.fx-bar input:focus{border-color:var(--accent)}
.fx-result{color:var(--amber);font-family:'JetBrains Mono','Fira Mono',monospace;font-weight:500;font-size:14px}
.row-active td{background:rgba(93,175,140,0.06)!important}
.row-cancelada td{opacity:0.5}
details>summary::-webkit-details-marker{display:none}
details[open]>summary{border-radius:10px 10px 0 0;border-bottom:1px solid var(--border)}
.widget-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.widget-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.widget-card h3{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:12px}
.cats-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;display:none}
.cats-panel.open{display:block}
.cats-panel-header{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px}
.cats-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.cat-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text)}
.cat-chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0;line-height:1}
.cat-chip button:hover{color:var(--red)}
.cat-add-row{display:flex;gap:7px}
.cat-add-row input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:5px;font-size:11px;font-family:'Inter',sans-serif;outline:none;flex:1}
.cat-add-row input:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-logo{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);font-family:'Inter',sans-serif;transition:background .15s}
.btn-google:hover{background:var(--surface)}
.btn-google img{width:18px;height:18px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.user-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover}
.user-name{font-size:11px;font-weight:500;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;padding:2px 6px}
.btn-logout:hover{color:var(--red)}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">💰</div>
    <div class="login-title">Mis Finanzas</div>
    <div class="login-sub">Ingresá con tu cuenta de Google para acceder a tus datos</div>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      Continuar con Google
    </button>
  </div>
</div>
<div class="app" id="mainApp" style="display:none">
<header>
  <div class="header-title">
    <div class="logo">💰</div>
    <div><h1>Mis Finanzas <span id="headerUser"></span></h1></div>
  </div>
  <div class="header-right">
    <span class="save-indicator" id="saveIndicator">● Sin cambios</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Oscuro</button>
    <button class="save-btn" onclick="saveData()">💾 Guardar</button>
    <button class="save-btn" style="background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)" onclick="exportJSON()">⬇ Exportar</button>
    <label class="import-btn" title="Importar JSON guardado">⬆ Importar<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
  </div>
</header>
<nav class="month-nav" id="monthNav"></nav>
<div class="main">
  <aside class="sidebar">
    <div class="nav-section">Secciones</div>
    <div class="nav-item active" onclick="showSection('dashboard')" id="nav-dashboard"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="showSection('ingresos')" id="nav-ingresos"><span class="icon">💵</span> Ingresos</div>
    <div class="nav-item" onclick="showSection('gastosFijos')" id="nav-gastosFijos"><span class="icon">🏠</span> Gastos Fijos</div>
    <div class="nav-item" onclick="showSection('visa')" id="nav-visa"><span class="icon">💳</span> VISA BBVA</div>
    <div class="nav-item" onclick="showSection('mastercard')" id="nav-mastercard"><span class="icon">💳</span> Mastercard</div>
    <div class="nav-item" onclick="showSection('gastosMes')" id="nav-gastosMes"><span class="icon">📝</span> Gastos del Mes</div>
    <div class="nav-item" onclick="showSection('facturacion')" id="nav-facturacion"><span class="icon">🏥</span> Facturación</div>
    <div class="nav-section" style="margin-top:12px">Anual</div>
    <div class="nav-item" onclick="showSection('anual')" id="nav-anual"><span class="icon">📈</span> Resumen Anual</div>
  </aside>
  <main class="content" id="mainContent"></main>
</div>
</div>
</div>
<script>
var MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ➕ NUEVO: toggle tema claro/oscuro
var isDarkMode = localStorage.getItem('finanzas_theme') === 'dark';
function applyTheme(){
  document.body.classList.toggle('dark', isDarkMode);
  var btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = isDarkMode ? '☀️ Claro' : '🌙 Oscuro';
}
function toggleTheme(){
  isDarkMode = !isDarkMode;
  localStorage.setItem('finanzas_theme', isDarkMode ? 'dark' : 'light');
  applyTheme();
}

    abril:      {ingresos:3007692.29, sueldo:1816892.29, usdVendidos:1145000, gastosFijos:176499.22, visa:554356.90,  mastercard:639207.93, gastosMes:1642547.60, totalGastos:3003804.98, saldo:3887.31,    presupuesto:0},

// --- MIGRATION ---
function migrateState(s) {
  if (!s) return null;
  try {
    // ➕ NUEVO: migrar cats por módulo
    if (!s.cats) s.cats = DEFAULT_CATS_GM.slice();
    if (!s.catsGF) s.catsGF = DEFAULT_CATS_GF.slice();
    if (!s.catsVisa) s.catsVisa = DEFAULT_CATS_VISA.slice();
    if (!s.catsMC) s.catsMC = DEFAULT_CATS_MC.slice();
    if (!s.catsGM) s.catsGM = DEFAULT_CATS_GM.slice();

    MONTHS.forEach(function(m) {
      if (s.ingresos && s.ingresos[m]) {
        if (typeof s.ingresos[m].devol === 'number') {
          var v = s.ingresos[m].devol;
          s.ingresos[m].devolItems = v > 0 ? [{desc:'Devolución',m:v}] : [];
          delete s.ingresos[m].devol;
        }
        if (!s.ingresos[m].devolItems) s.ingresos[m].devolItems = [];
      }
      if (s.gastosFijos && s.gastosFijos[m] && !Array.isArray(s.gastosFijos[m])) {
        var obj = s.gastosFijos[m];
        var LBL = {alquiler:'Alquiler',terapia:'Terapia',telecentro:'Telecentro',edesur:'Edesur',metrogas:'Metrogas',movistar:'Movistar',monotributo:'Monotributo',sancor:'Sancor Salud',expensas:'Expensas',gym:'GYM',netflix:'Netflix',extra:'Extra'};
        s.gastosFijos[m] = Object.keys(obj).map(function(k){ return {label:obj[k].label||LBL[k]||k, m:obj[k].m, p:obj[k].p, fijo:true}; });
      }
      // ✏️ FIX Bug2: asegurar campo fijo en gastos fijos existentes
      if (s.gastosFijos && Array.isArray(s.gastosFijos[m])) {
        s.gastosFijos[m].forEach(function(r){ if (r.fijo === undefined) r.fijo = true; });
      }
      // ✏️ FIX Bug4: migrar facturación vieja al nuevo formato de items libres
      if (s.facturacion && s.facturacion[m]) {
        var f = s.facturacion[m];
        if (!f.items) {
          var items = [];
          var ambT = (f.ambDias||0)*(f.ambRate||0);
          var tranT = (f.tranDias||0)*(f.tranRate||0);
          if (ambT > 0) items.push({razonSocial:'Ambulancia (Jueves)', concepto:'Días: '+(f.ambDias||0)+' × $'+(f.ambRate||0), monto: ambT});
          if (tranT > 0) items.push({razonSocial:'Tránsito (Miércoles)', concepto:'Días: '+(f.tranDias||0)+' × $'+(f.tranRate||0), monto: tranT});
          if (f.extras > 0) items.push({razonSocial:'Extras', concepto:'Varios', monto: f.extras||0});
          if (f.internaciones > 0) items.push({razonSocial:'Internaciones', concepto:'Varios', monto: f.internaciones||0});
          s.facturacion[m] = {items: items, descuentos: f.descuentos||0};
        }
      }
    });
    ['visa','mastercard'].forEach(function(card) {
      if (s[card] && !s[card].gastos) {
        var old = s[card];
        var pagos = {};
        MONTHS.forEach(function(m) {
          pagos[m] = {paid:!!(old[m]&&old[m].pendiente===0&&old[m].total>0), extra:old[m]?old[m].total:0};
        });
        s[card] = {gastos:[], pagos:pagos};
      }
      if (s[card] && s[card].pagos) {
        MONTHS.forEach(function(m) { if (!s[card].pagos[m]) s[card].pagos[m]={paid:false,extra:0}; });
      }
      // ✏️ FIX Bug3: asegurar campo canceladaEn en gastos de tarjeta
      if (s[card] && s[card].gastos) {
        s[card].gastos.forEach(function(g){ if (g.canceladaEn === undefined) g.canceladaEn = null; });
      }
    });
  } catch(e) { return null; }

  localStorage.setItem('finanzas2026_v2', JSON.stringify(state));
  $('saveIndicator').textContent = 'Guardando...';
  $('saveIndicator').className = 'save-indicator';
  // Intentar UPDATE primero, si no existe INSERT
  fetch(SB_URL + '/rest/v1/finanzas?user_id=eq.'+uid, {
    method: 'PATCH',
    headers: Object.assign({}, getAuthHeaders(), {'Prefer':'return=minimal,count=exact'}),
    body: JSON.stringify({data: state, updated_at: new Date().toISOString()})
  }).then(function(r){
    var count = r.headers.get('content-range');
    if(count === '*/0'){
      // No existe, hacer INSERT
      return fetch(SB_URL + '/rest/v1/finanzas', {
        method: 'POST',
        headers: Object.assign({}, getAuthHeaders(), {'Prefer':'return=minimal'}),
        body: JSON.stringify({user_id: uid, data: state, updated_at: new Date().toISOString()})
      });
    }
    return r;
  }).then(function(r){
    if(r && r.ok){
      isDirty = false;
      $('saveIndicator').textContent = 'Guardado en la nube';
      $('saveIndicator').className = 'save-indicator saved';
      setTimeout(function(){ if(!isDirty){ $('saveIndicator').textContent='Sin cambios'; $('saveIndicator').className='save-indicator'; } }, 2500);
    } else {
      $('saveIndicator').textContent = 'Error al guardar';
    }
  }).catch(function(){
    isDirty = false;
    $('saveIndicator').textContent = 'Sin conexion - guardado local';
    $('saveIndicator').className = 'save-indicator';
  });
}

function loadFromSupabase(callback){
  if(!currentUser){ callback(); return; }
  var uid = currentUser.id;
  $('saveIndicator').textContent = 'Cargando...';
  fetch(SB_URL + '/rest/v1/finanzas?user_id=eq.'+uid+'&select=data,updated_at', {
    headers: getAuthHeaders()
  }).then(function(r){ return r.json(); })
  .then(function(rows){
    if(rows && rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0){
      var migrated = migrateState(JSON.parse(JSON.stringify(rows[0].data)));
      if(migrated){
        state = migrated;
        localStorage.setItem('finanzas2026_v2', JSON.stringify(state));
      }
    }
    $('saveIndicator').textContent = 'Sin cambios';
    callback();
  }).catch(function(){
    $('saveIndicator').textContent = 'Sin conexion - datos locales';
    callback();
  });
}

// ✏️ FIX Bug3: calcCard ahora respeta campo canceladaEn
function calcCard(card, mi) {
  var d = state[card]; var m = MONTHS[mi];
  var cuotasT = 0; var activos = [];
  (d.gastos||[]).forEach(function(g,gi){
    var vigente = mi >= g.mesInicio && mi < g.mesInicio + g.cuotas;
    var noCancelada = (g.canceladaEn === null || g.canceladaEn === undefined || mi < g.canceladaEn);
    if (vigente && noCancelada) {
      var cv = g.montoTotal/g.cuotas;
      cuotasT += cv;
      activos.push({gi:gi, desc:g.desc, cv:cv, num:mi-g.mesInicio+1, total:g.cuotas});
    }
  });
  var pago = d.pagos[m]||{paid:false,extra:0};
  var extra = pago.extra||0;
  var total = cuotasT + extra;
  var paid = !!pago.paid;
  return {total:total, pagado:paid?total:0, pendiente:paid?0:total, cuotasT:cuotasT, extra:extra, paid:paid, activos:activos};
}

// --- SYNC ---
function syncDash() {
  var m = currentMonth; var mi = MONTHS.indexOf(m);
  var ing = state.ingresos[m];
  // ✏️ FIX Ingresos: usar sueldoItems si existe, sino fallback a campos legacy
  var sueldo;
  if (ing.sueldoItems && ing.sueldoItems.length > 0) {
    sueldo = ing.sueldoItems.reduce(function(s,it){ return s+it.m; },0);
  } else {
    sueldo = (ing.sueldo_a||0)+(ing.sueldo_b||0)+(ing.horasExtras||0);
  }
  var usdARS = (ing.usd||[]).reduce(function(s,u){ return s+u.m; },0);
  var devolT = (ing.devolItems||[]).reduce(function(s,d){ return s+d.m; },0);
  var ingresos = sueldo+usdARS+devolT;
  var gfRows = state.gastosFijos[m]||[];
  var gfTotal = gfRows.reduce(function(s,r){ return s+r.m; },0);
  var gfPagado = gfRows.reduce(function(s,r){ return s+(r.p?r.m:0); },0);
  var gfPend = gfTotal - gfPagado;
  var vc = calcCard('visa',mi); var mc = calcCard('mastercard',mi);
  var gm = (state.gastosMes[m]||[]).reduce(function(s,r){ return s+r.m; },0);
  var totalGastos = gfTotal + vc.total + mc.total + gm;
  var totalPagado = gfPagado + vc.pagado + mc.pagado + gm;
  var deficit = gfPend + vc.pendiente + mc.pendiente;
  var saldo = ingresos - totalPagado;
  var d = state.dashboard[m];
  d.sueldo=sueldo; d.usdVendidos=usdARS; d.ingresos=ingresos;
  d.gastosFijos=gfTotal; d.gfPagado=gfPagado; d.gfPend=gfPend;
  d.visa=vc.total; d.mastercard=mc.total; d.gastosMes=gm;
  d.totalGastos=totalGastos; d.totalPagado=totalPagado; d.deficit=deficit; d.saldo=saldo;
}

function updSueldo(i,f,v){
  var d=state.ingresos[currentMonth];
  if(!d.sueldoItems) d.sueldoItems=[];
  if(f==='m') d.sueldoItems[i].m=parseNum(v); else d.sueldoItems[i].desc=v;
  // sync campos legacy para compatibilidad con syncDash
  d.sueldo_a = d.sueldoItems[0]?d.sueldoItems[0].m:0;
  d.sueldo_b = d.sueldoItems[1]?d.sueldoItems[1].m:0;
  d.horasExtras = d.sueldoItems[2]?d.sueldoItems[2].m:0;
  syncDash(); markDirty();
}
function addSueldo(){
  var d=state.ingresos[currentMonth];
  if(!d.sueldoItems) d.sueldoItems=[];
  d.sueldoItems.push({desc:'Nueva fuente',m:0});
  syncDash(); markDirty(); renderIngresos();
}
function remSueldo(i){
  var d=state.ingresos[currentMonth];
  d.sueldoItems.splice(i,1);
  d.sueldo_a = d.sueldoItems[0]?d.sueldoItems[0].m:0;
  d.sueldo_b = d.sueldoItems[1]?d.sueldoItems[1].m:0;
  d.horasExtras = d.sueldoItems[2]?d.sueldoItems[2].m:0;
  syncDash(); markDirty(); renderIngresos();
}
function updUSD(i,f,v){ if(f==='m') state.ingresos[currentMonth].usd[i].m=parseNum(v); else state.ingresos[currentMonth].usd[i].c=v; syncDash(); markDirty(); }
function addUSD(){ if(!state.ingresos[currentMonth].usd) state.ingresos[currentMonth].usd=[]; state.ingresos[currentMonth].usd.push({c:'',m:0}); syncDash(); markDirty(); renderIngresos(); }
function remUSD(i){ state.ingresos[currentMonth].usd.splice(i,1); syncDash(); markDirty(); renderIngresos(); }
function updDevol(i,f,v){ if(f==='m') state.ingresos[currentMonth].devolItems[i].m=parseNum(v); else state.ingresos[currentMonth].devolItems[i].desc=v; syncDash(); markDirty(); }
function addDevol(){ if(!state.ingresos[currentMonth].devolItems) state.ingresos[currentMonth].devolItems=[]; state.ingresos[currentMonth].devolItems.push({desc:'',m:0}); syncDash(); markDirty(); renderIngresos(); }
function remDevol(i){ state.ingresos[currentMonth].devolItems.splice(i,1); syncDash(); markDirty(); renderIngresos(); }

// ✏️ FIX Bug GF replicación: getGFRows NO muta state — devuelve vista compuesta para render
// La propagación de fijos ocurre solo al GUARDAR (addGF / selectMonth con datos vacíos)
function getGFEffectiveRows() {
  var mi = MONTHS.indexOf(currentMonth);
  // Partimos de los ítems reales del mes actual (los que el usuario guardó)
  var real = (state.gastosFijos[currentMonth] || []);
  var labelsEnMes = real.map(function(r){ return r.label; });
  // Construimos lista de fijos heredados de meses anteriores que NO existen en el mes actual
  var heredados = [];
  if (mi > 0) {
    var vistos = {};
    labelsEnMes.forEach(function(l){ vistos[l] = true; });
    for (var pi = mi-1; pi >= 0; pi--) {
      (state.gastosFijos[MONTHS[pi]]||[]).forEach(function(r){
        if (r.fijo && !vistos[r.label]) {
          vistos[r.label] = true;
          heredados.push({label:r.label, m:r.m, p:false, fijo:true, _heredado:true});
        }
      });
    }
  }
  // Los heredados van AL FINAL solo visualmente — el usuario puede guardarlos con addGF
  // IMPORTANTE: los índices de la tabla corresponden SOLO a real[], los heredados son read-only
  return {real: real, heredados: heredados, all: real.concat(heredados)};
}

function renderGF(){
  var gf = getGFEffectiveRows();
  var rows = gf.real;        // solo los guardados (índices editables)
  var heredados = gf.heredados;
  var total=rows.reduce(function(s,r){ return s+r.m; },0);
  var pagado=rows.reduce(function(s,r){ return s+(r.p?r.m:0); },0);
  var pend=total-pagado;
  var h='<div class="section-title">🏠 Gastos Fijos <span>— '+mname(currentMonth)+' 2026</span></div>';

function addCardG(card){
  if(!state[card].gastos) state[card].gastos=[];
  state[card].gastos.push({desc:'Nueva compra',montoTotal:0,cuotas:1,mesInicio:MONTHS.indexOf(currentMonth),canceladaEn:null});

  renderTarjeta(card, true); // ✏️ FIX Bug1: pasar true para mantener abierto
}
function remCardG(card,i){ state[card].gastos.splice(i,1); syncDash(); markDirty(); renderTarjeta(card); }
function updCardG(card,i,f,v){
  if(f==='montoTotal') state[card].gastos[i].montoTotal=parseNum(v);
  else if(f==='cuotas') state[card].gastos[i].cuotas=Math.max(1,parseInt(v)||1);
  else if(f==='mesInicio') state[card].gastos[i].mesInicio=parseInt(v)||0;
  else if(f==='cat') state[card].gastos[i].cat=v;
  else state[card].gastos[i].desc=v;
  syncDash(); markDirty();
}
function togCardPago(card,month,paid){ if(!state[card].pagos[month]) state[card].pagos[month]={paid:false,extra:0}; state[card].pagos[month].paid=paid; syncDash(); markDirty(); }
function updCardExtra(card,month,v){
  var wasOpen = document.querySelector('#mainContent details')?.open || false;
  if(!state[card].pagos[month]) state[card].pagos[month]={paid:false,extra:0};
  state[card].pagos[month].extra=parseNum(v);
  syncDash(); markDirty();
}

function reactivarCuota(card,i){

// ➕ NUEVO: panel de edición de categorías por módulo
function getCatsKey(context){
  if(context==='gastosMes') return 'catsGM';
  if(context==='visa') return 'catsVisa';
  if(context==='mastercard') return 'catsMC';
  if(context==='gastosFijos') return 'catsGF';
  return 'catsGM';
}
function getCatsDefault(context){
  if(context==='gastosMes') return DEFAULT_CATS_GM;
  if(context==='visa') return DEFAULT_CATS_VISA;
  if(context==='mastercard') return DEFAULT_CATS_MC;
  if(context==='gastosFijos') return DEFAULT_CATS_GF;
  return DEFAULT_CATS_GM;
}
function renderCatsPanel(context){
  var key = getCatsKey(context);
  var CATS = state[key] || getCatsDefault(context);
  var h='<div class="cats-panel" id="catsPanel_'+context+'">';
  h+='<div class="cats-panel-header">⚙️ Gestionar categorías</div>';
  h+='<div class="cats-list">';
  CATS.forEach(function(cat,i){
    h+='<div class="cat-chip">'+cat+'<button onclick="removeCat('+i+',\''+context+'\')">✕</button></div>';
  });
  h+='</div>';
  h+='<div class="cat-add-row"><input type="text" id="newCatInput_'+context+'" placeholder="Nueva categoría..." onkeydown="if(event.key===\'Enter\') addCat(\''+context+'\')"><button class="btn-sm" onclick="addCat(\''+context+'\')">+ Agregar</button></div>';
  h+='</div>';
  return h;
}
function toggleCatsPanel(context){
  var p = document.getElementById('catsPanel_'+context);
  if(p) p.classList.toggle('open');
}
function addCat(context){
  var inp = document.getElementById('newCatInput_'+context);
  if(!inp) return;
  var val = inp.value.trim();
  if(!val) return;
  var key = getCatsKey(context);
  if(!state[key]) state[key] = getCatsDefault(context).slice();
  if(state[key].indexOf(val)===-1){ state[key].push(val); markDirty(); }
  renderSection();
  setTimeout(function(){ toggleCatsPanel(context); },10);
}
function removeCat(i, context){
  var key = getCatsKey(context);
  if(!state[key]) state[key] = getCatsDefault(context).slice();
  state[key].splice(i,1); markDirty();
  renderSection();
  setTimeout(function(){ toggleCatsPanel(context); },10);
}

// ✏️ FIX Bug4: facturación completamente libre, items por mes
function renderFact(){
  var d=state.facturacion[currentMonth];
  if(!d.items) d.items=[];
  var subtotal=d.items.reduce(function(s,it){ return s+(it.monto||0); },0);
  var total=subtotal-(d.descuentos||0);
  var h='<div class="section-title">🏥 Facturación <span>— '+mname(currentMonth)+' 2026</span></div>';
  h+='<div class="cards-grid" style="grid-template-columns:repeat(3,1fr)">';
  h+='<div class="card blue"><div class="card-label">Subtotal</div><div class="card-value">'+fmt(subtotal)+'</div></div>';
  h+='<div class="card red"><div class="card-label">Descuentos</div><div class="card-value">'+fmt(d.descuentos||0)+'</div></div>';
  h+='<div class="card green"><div class="card-label">Total Facturado</div><div class="card-value">'+fmt(total)+'</div></div>';
  h+='</div>';
  h+='<div class="table-wrap"><div class="table-header"><h3>Items de Facturación — '+mname(currentMonth)+'</h3><span style="font-size:11px;color:var(--text3)">Razón social y concepto editables</span></div>';
  h+='<table><thead><tr><th>Razón Social</th><th>Concepto</th><th class="num">Monto $ARS</th><th style="width:40px"></th></tr></thead><tbody>';
  if(d.items.length===0){
    h+='<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Sin items de facturación. Usá el botón de abajo para agregar.</td></tr>';
  }
  d.items.forEach(function(it,i){
    h+='<tr>';
    h+='<td><input class="editable-text" value="'+(it.razonSocial||'')+'" placeholder="Ej: Galeno S.A." onchange="updFact('+i+',\'razonSocial\',this.value)"></td>';
    h+='<td><input class="editable-text" value="'+(it.concepto||'')+'" placeholder="Ej: Guardia - 4 días" onchange="updFact('+i+',\'concepto\',this.value)"></td>';
    h+='<td class="num"><input class="editable" value="'+(it.monto||0)+'" onchange="updFact('+i+',\'monto\',this.value)"></td>';
    h+='<td><button class="btn-danger" onclick="remFactItem('+i+')">✕</button></td></tr>';
  });
  h+='</tbody><tfoot>';
  h+='<tr class="total-row"><td colspan="2">Subtotal</td><td class="num">'+fmt(subtotal)+'</td><td></td></tr>';
  h+='</tfoot></table>';
  h+='<button class="add-row-btn" onclick="addFactItem()">+ Agregar razón social / item</button></div>';
  h+='<div class="table-wrap"><div class="table-header"><h3>Descuentos globales</h3></div><table><tbody>';
  h+='<tr><td>Total descuentos del mes</td><td class="num"><input class="editable" value="'+(d.descuentos||0)+'" onchange="updFactDescuentos(this.value)"></td></tr>';
  h+='</tbody></table></div>';
  h+='<div class="summary-section">';
  h+='<div class="summary-row"><span class="summary-key">Subtotal facturado</span><span class="summary-val" style="color:var(--blue)">'+fmt(subtotal)+'</span></div>';
  h+='<div class="summary-row"><span class="summary-key">Descuentos</span><span class="summary-val" style="color:var(--red)">− '+fmt(d.descuentos||0)+'</span></div>';
  h+='<div class="summary-row"><span class="summary-key" style="font-weight:700">TOTAL FACTURADO</span><span class="summary-val" style="color:var(--green);font-size:18px">'+fmt(total)+'</span></div>';
  h+='</div>';
  $('mainContent').innerHTML=h;
}
function updFact(i,f,v){
  var d=state.facturacion[currentMonth];
  if(f==='monto') d.items[i].monto=parseNum(v);
  else d.items[i][f]=v;
  markDirty(); renderFact();
}
function updFactDescuentos(v){ state.facturacion[currentMonth].descuentos=parseNum(v); markDirty(); renderFact(); }
function addFactItem(){
  if(!state.facturacion[currentMonth].items) state.facturacion[currentMonth].items=[];
  state.facturacion[currentMonth].items.push({razonSocial:'',concepto:'',monto:0});
  markDirty(); renderFact();
}
function remFactItem(i){ state.facturacion[currentMonth].items.splice(i,1); markDirty(); renderFact(); }

// --- ANUAL ---
function renderAnual(){
  var totI=MONTHS.reduce(function(s,m){ return s+(state.dashboard[m].ingresos||0); },0);
  var totF=MONTHS.reduce(function(s,m){ return s+(state.dashboard[m].gastosFijos||0); },0);
  var totV=MONTHS.reduce(function(s,m,i){ return s+calcCard('visa',i).total; },0);
  var totM=MONTHS.reduce(function(s,m,i){ return s+calcCard('mastercard',i).total; },0);
  var totGM=MONTHS.reduce(function(s,m){ return s+(state.dashboard[m].gastosMes||0); },0);
  var totG=MONTHS.reduce(function(s,m){ return s+(state.dashboard[m].totalGastos||0); },0);
  var h='<div class="section-title">📈 Resumen Anual 2026</div>';
  h+='<div class="cards-grid">';
  h+='<div class="card green"><div class="card-label">Total Ingresos</div><div class="card-value" style="font-size:16px">'+fmt(totI)+'</div></div>';
  h+='<div class="card red"><div class="card-label">Total Gastos</div><div class="card-value" style="font-size:16px">'+fmt(totG)+'</div></div>';
  h+='<div class="card blue"><div class="card-label">Total VISA</div><div class="card-value" style="font-size:16px">'+fmt(totV)+'</div></div>';
  h+='<div class="card purple"><div class="card-label">Total Mastercard</div><div class="card-value" style="font-size:16px">'+fmt(totM)+'</div></div>';
  h+='</div>';
  h+='<div class="chart-card" style="margin-bottom:20px"><h3>Ingresos vs Gastos Mensuales</h3><div class="chart-container" style="height:240px"><canvas id="cAnual"></canvas></div></div>';
  h+='<div class="table-wrap"><table><thead><tr><th>Mes</th><th class="num">Ingresos</th><th class="num">G. Fijos</th><th class="num">VISA</th><th class="num">Mastercard</th><th class="num">G. Mes</th><th class="num">Saldo</th></tr></thead><tbody>';
  MONTHS.forEach(function(m,i){
    var d=state.dashboard[m];
    var vc2=calcCard('visa',i); var mc2=calcCard('mastercard',i);
    var sal=(d.ingresos||0)-(d.gastosFijos||0)-vc2.total-mc2.total-(d.gastosMes||0);
    h+='<tr'+(m===currentMonth?' style="background:rgba(56,189,248,0.08)"':'')+'>';
    h+='<td>'+MONTH_NAMES[i]+'</td>';
    h+='<td class="num" style="color:var(--green)">'+fmt(d.ingresos||0)+'</td>';
    h+='<td class="num">'+fmt(d.gastosFijos||0)+'</td>';
    h+='<td class="num" style="color:var(--blue)">'+fmt(vc2.total)+'</td>';
    h+='<td class="num" style="color:var(--purple)">'+fmt(mc2.total)+'</td>';
    h+='<td class="num">'+fmt(d.gastosMes||0)+'</td>';
    h+='<td class="num" style="color:'+(sal>=0?'var(--green)':'var(--red)')+'">' +fmt(sal)+'</td></tr>';
  });
  h+='</tbody><tfoot><tr class="total-row"><td>TOTAL</td><td class="num">'+fmt(totI)+'</td><td class="num">'+fmt(totF)+'</td><td class="num">'+fmt(totV)+'</td><td class="num">'+fmt(totM)+'</td><td class="num">'+fmt(totGM)+'</td><td class="num" style="color:'+(totI-totG>=0?'var(--green)':'var(--red)')+'">' +fmt(totI-totG)+'</td></tr></tfoot></table></div>';
  $('mainContent').innerHTML=h;
  setTimeout(function(){
    var ctx=document.getElementById('cAnual');
    if(ctx) new Chart(ctx,{type:'bar',data:{
      labels:MONTH_NAMES.map(function(n){ return n.slice(0,3); }),
      datasets:[
        {label:'Ingresos',data:MONTHS.map(function(m){ return state.dashboard[m].ingresos||0; }),backgroundColor:'#22c55e44',borderColor:'#22c55e',borderWidth:2,borderRadius:4},
        {label:'Gastos',data:MONTHS.map(function(m){ return state.dashboard[m].totalGastos||0; }),backgroundColor:'#f8717144',borderColor:'#f87171',borderWidth:2,borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{y:{grid:{color:'#1e3a5f'},ticks:{color:'#64748b',callback:function(v){ return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+(v/1e3)+'k'; }}},x:{grid:{display:false},ticks:{color:'#64748b'}}}}
    });
  },100);
}

// --- INIT ---
applyTheme();

if(supabase){
  // onAuthStateChange maneja TODOS los casos:
  // - sesion existente al recargar
  // - redirect de vuelta desde Google (SIGNED_IN event)
  // - logout
  supabase.auth.onAuthStateChange(function(event, session){
    if((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session && session.user){
      initApp(session.user);
    } else if(event === 'SIGNED_OUT' || (!session && event === 'INITIAL_SESSION')){
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
    }
  });
} else {
  // Sin Supabase: modo local directo
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'grid';
  buildMonthNav();
  renderSection();
}
setInterval(function(){ if(isDirty && currentUser) saveData(); }, 60000);
document.addEventListener('keydown',function(e){ if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveData(); } });
window.addEventListener('beforeunload', function(){ if(isDirty && currentUser) saveData(); });
</script>
